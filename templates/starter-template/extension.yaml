name: my-extension
display_name: "My Extension"
version: "1.0.0"
author: "Your Name"
description: "A brief description of my extension."
entry_point: "extension.py"
ui_entry: "templates/index.html"
pclink_version: ">=3.1.0"
supported_platforms:
  - windows
  - linux
  - macos
permissions: []
category: Utility
min_server_version: 1.0.0

# UI Flags (Optional)
ui_capabilities:
  allow_fullscreen: false
  allow_touchpad_overlay: false
  allow_keyboard: false
  prevent_sleep: false
  orientation: "auto" # auto, follow_system, landscape, portrait

# Dashboard Widgets (Optional)
dashboard_widgets: []
