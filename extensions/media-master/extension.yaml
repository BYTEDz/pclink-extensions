name: media-master
display_name: Media Master Pro
version: 2.1.0
description: Modern media controller with seek support and a premium mobile UI.
author: BYTEDz
license: MIT
pclink_version: ">=3.6.0"
min_server_version: 3.5.0
entry_point: extension.py
ui_entry: templates/index.html
icon: icon.svg
theme_aware_icon: true
category: Utility
supported_platforms:
  - windows
  - linux
  - macos
permissions:
  - theme.read

dashboard_widgets:
  - id: controls
    display_name: Media Controls
    ui_entry: templates/widget.html
    width: 1
    height: 2
    refresh_ms: 0
