<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        :root {
            --primary: #2196F3;
            --bg: transparent;
            --text: #ffffff;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.1);
        }

        :root[data-theme="light"] {
            --text: #1a1a1a;
            --surface: rgba(0, 0, 0, 0.04);
            --surface-hover: rgba(0, 0, 0, 0.08);
        }

        body {
            margin: 0;
            padding: 8px 12px;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .media-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 10px;
            background: var(--surface);
            border-radius: 16px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
        }

        .btn:active {
            background: var(--surface-hover);
            transform: scale(0.9);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }

        .btn-primary:active {
            background: var(--primary);
            opacity: 0.9;
        }

        .icon-svg {
            width: 24px;
            height: 24px;
            fill: var(--text);
        }

        .btn-primary .icon-svg {
            fill: white;
        }

        .volume-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 4px;
        }

        .vol-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 38px;
            background: var(--surface);
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .vol-btn:active {
            background: var(--surface-hover);
            transform: scale(0.98);
        }
        
        .vol-icon-svg {
            width: 18px;
            height: 18px;
            fill: var(--text);
        }

    </style>
</head>
<body>
    <div class="media-container">
        <div class="control-row">
            <div class="btn" onclick="control('prev')">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </div>
            <div class="btn btn-primary" onclick="control('play_pause')" id="play-btn">
                <svg class="icon-svg" viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="btn" onclick="control('next')">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </div>
        </div>

        <div class="volume-row">
            <div class="vol-btn" onclick="control('vol_down')">
                <svg class="vol-icon-svg" viewBox="0 0 24 24"><path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg>
                Down
            </div>
            <div class="vol-btn" onclick="control('vol_up')">
                <svg class="vol-icon-svg" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                Up
            </div>
            <div class="vol-btn" onclick="control('mute')" style="max-width: 50px;">
                <svg class="vol-icon-svg" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        
        function updateUI(theme) {
            if (theme.theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            if (theme.primaryColor) document.documentElement.style.setProperty('--primary', '#' + theme.primaryColor);
            if (theme.textColor) document.documentElement.style.setProperty('--text', '#' + theme.textColor);
        }

        window.updateTheme = function(theme) {
            updateUI(theme);
        };

        updateUI({
            theme: params.get('theme'),
            primaryColor: params.get('primary_color'),
            textColor: params.get('text_color')
        });

        window.onPCLinkResize = function() {
            if (window.PCLinkWidget) {
                const height = document.body.scrollHeight;
                window.PCLinkWidget.postMessage('height:' + height);
            }
        };

        async function control(action) {
            try {
                // FIXED: Use correct action names from extension.py (vol_up, vol_down, prev)
                const res = await fetch(`/extensions/media-master/control/${action}`, { method: 'POST' });
                await res.json();
            } catch (e) {
                console.error("Media Master error:", e);
            }
        }

        const observer = new MutationObserver(onPCLinkResize);
        observer.observe(document.body, { attributes: true, childList: true, subtree: true });
        
        window.addEventListener('load', () => {
             onPCLinkResize();
             if (window.PCLinkWidget) window.PCLinkWidget.postMessage('loaded');
        });
    </script>
</body>
</html>
