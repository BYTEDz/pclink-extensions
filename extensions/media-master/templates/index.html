<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="/ui/static/extension-theme.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* Inherited from SDK: font-family, background, text color */
            margin: 0; 
            padding: 16px;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%; 
            max-width: 380px;
            display: flex; 
            flex-direction: column; 
            gap: 24px;
        }

        /* Album Art Area - Sync with var(--radius) */
        .art-card {
            aspect-ratio: 1/1;
            background: linear-gradient(135deg, var(--primary), var(--primary-muted));
            border-radius: var(--radius); /* Applied SDK Radius */
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: var(--card-shadow);
            position: relative; 
            overflow: hidden;
            border: var(--card-border);
        }
        
        .art-card i { 
            color: white; 
            opacity: 0.9; 
            width: 80px; 
            height: 80px; 
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.3));
        }
        
        /* Song Info */
        .info { text-align: left; padding: 0 8px; }
        .info h1 { 
            margin: 0; 
            font-size: 1.5rem; 
            font-weight: 900; 
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, var(--primary), var(--text));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .info p { margin: 4px 0 0; color: var(--text-muted); font-size: 1rem; font-weight: 600; }

        /* Modern Transport Controls */
        .transport {
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0 10px;
        }
        
        .btn-main {
            background: var(--primary); /* Use primary color for main action */
            color: white;
            border: none; 
            border-radius: 50%; /* Play button stays circular */
            width: 72px; 
            height: 72px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer; 
            transition: transform 0.1s;
            box-shadow: 0 0 20px var(--primary-muted);
        }
        
        .btn-icon {
            background: none; 
            border: none; 
            color: var(--text);
            width: 48px; 
            height: 48px;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: opacity 0.2s;
        }
        
        .btn-icon:active { opacity: 0.5; }
        .btn-main:active { transform: scale(0.9); }

        /* Secondary Controls (Seek) - Sync with var(--radius) */
        .secondary-actions {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px;
        }
        
        .seek-btn {
            background: var(--surface);
            border: var(--card-border);
            color: var(--text);
            padding: 14px; 
            border-radius: calc(var(--radius) * 0.7); /* Slightly smaller than main radius */
            font-size: 0.85rem; 
            font-weight: 800;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Volume Bar Wrapper - Sync with var(--radius) */
        .volume-section {
            background: var(--surface);
            border: var(--card-border);
            padding: 20px; 
            border-radius: var(--radius); /* Applied SDK Radius */
            display: flex; 
            align-items: center; 
            gap: 16px;
            box-shadow: var(--card-shadow);
        }
        
        .vol-btn { 
            background: none; 
            border: none; 
            color: var(--text-muted); 
            padding: 0; 
            display: flex;
        }

        .vol-track {
            flex-grow: 1; 
            height: 6px; 
            background: var(--primary-faint); 
            border-radius: 100px; 
            position: relative;
            overflow: hidden;
        }

        .vol-fill {
            width: 65%; 
            height: 100%; 
            background: var(--primary); 
            border-radius: 100px;
            box-shadow: 0 0 10px var(--primary-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Visual Art -->
        <div class="art-card">
            <i data-lucide="music-4"></i>
        </div>

        <!-- Meta -->
        <div class="info">
            <h1>Active Media</h1>
            <p>Remote PC Playback</p>
        </div>

        <!-- Main Playback -->
        <div class="transport">
            <button class="btn-icon" onclick="control('prev')"><i data-lucide="skip-back"></i></button>
            <button class="btn-icon" onclick="control('seek_bwd')"><i data-lucide="rotate-ccw"></i></button>
            <button class="btn-main" onclick="control('play_pause')"><i data-lucide="play" id="playIcon"></i></button>
            <button class="btn-icon" onclick="control('seek_fwd')"><i data-lucide="rotate-cw"></i></button>
            <button class="btn-icon" onclick="control('next')"><i data-lucide="skip-forward"></i></button>
        </div>

        <!-- Seek Shortcuts -->
        <div class="secondary-actions">
            <button class="seek-btn" onclick="control('seek_bwd')">
                <i data-lucide="chevrons-left" size="18"></i> -10S
            </button>
            <button class="seek-btn" onclick="control('seek_fwd')">
                10S <i data-lucide="chevrons-right" size="18"></i>
            </button>
        </div>

        <!-- Volume Control -->
        <div class="volume-section">
            <button class="vol-btn" onclick="control('vol_down')"><i data-lucide="volume-1"></i></button>
            <div class="vol-track">
                <div class="vol-fill"></div>
            </div>
            <button class="vol-btn" onclick="control('vol_up')"><i data-lucide="volume-2"></i></button>
        </div>
    </div>

    <script>
        const apiPath = window.location.pathname.replace(/\/ui$/, '');
        let isPlaying = false;

        async function control(action) {
            if(action === 'play_pause') {
                isPlaying = !isPlaying;
                const icon = document.getElementById('playIcon');
                icon.setAttribute('data-lucide', isPlaying ? 'pause' : 'play');
                lucide.createIcons();
            }
            try {
                await fetch(`${apiPath}/control/${action}`, { method: 'POST' });
            } catch (e) { console.error(e); }
        }
        
        lucide.createIcons();
    </script>
</body>
</html>
