name: text-beamer
display_name: Text Beamer
version: 1.0.0
author: "Community"
description: "Beam text from your phone and have it typed on your PC keyboard — great for passwords, URLs, code snippets, and chat messages."
pclink_version: ">=3.2.0"
entry_point: extension.py
ui_entry: templates/index.html
icon: icon.svg
theme_aware_icon: true
category: Utility
supported_platforms:
  - windows
  - linux
  - darwin
permissions:
  - input.inject
