<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="/ui/static/extension-theme.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: manipulation;
            user-select: none;
        }

        body {
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg);
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        /* Unified Card Style */
        .card-base {
            background: var(--surface);
            border: var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
        }

        /* Main Slide Card (The "Viewport") */
        .slide-card {
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, var(--primary), var(--primary-muted));
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: var(--card-shadow);
            border: var(--card-border);
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .slide-card:active {
            transform: scale(0.98);
        }

        .slide-card i {
            color: white;
            width: 48px;
            height: 48px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
            opacity: 0.9;
        }

        .slide-hint {
            position: absolute;
            bottom: 12px;
            right: 12px;
            color: white;
            font-size: 0.6rem;
            font-weight: 900;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        /* Main Navigation (Symmetrical 2x2 Grid) */
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .nav-card {
            background: var(--surface);
            border: var(--card-border);
            border-radius: var(--radius);
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text);
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.1s;
        }

        .nav-card:active {
            transform: scale(0.96);
            background: var(--glass);
        }

        .nav-card i {
            width: 24px;
            height: 24px;
            color: var(--primary);
        }

        /* Highlighted Next Button */
        .nav-card.primary {
            background: var(--primary-faint);
            border-color: var(--primary);
        }

        /* Bottom Utility Row (Symmetrical 4-column) */
        .actions-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .action-card {
            background: var(--surface);
            border: var(--card-border);
            border-radius: var(--radius);
            padding: 12px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: var(--text);
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.1s;
        }

        .action-card:active {
            transform: scale(0.95);
            background: var(--glass);
        }

        .action-card i {
            width: 18px;
            height: 18px;
            color: var(--text-muted);
        }

        .action-card.danger {
            color: #f44336;
        }

        .action-card.danger i {
            color: #f44336;
        }

        .action-card:active i {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Main Visual Target -->
        <div class="slide-card" onclick="control('next')">
            <i data-lucide="presentation"></i>
            <span class="slide-hint">NEXT SLIDE →</span>
        </div>

        <!-- Primary Controls -->
        <div class="nav-grid">
            <div class="nav-card" onclick="control('prev')">
                <i data-lucide="chevron-left"></i>
                Previous
            </div>
            <div class="nav-card primary" onclick="control('next')">
                <i data-lucide="chevron-right"></i>
                Next
            </div>
        </div>

        <!-- Secondary Playback Controls -->
        <div class="nav-grid">
            <div class="nav-card" onclick="control('start_current')">
                <i data-lucide="play"></i>
                Resume
            </div>
            <div class="nav-card" onclick="control('start')">
                <i data-lucide="monitor-play"></i>
                Start
            </div>
        </div>

        <!-- Symmetrical Utility Row -->
        <div class="actions-row">
            <div class="action-card" onclick="control('black')">
                <i data-lucide="monitor-dot"></i>
                Black
            </div>
            <div class="action-card" onclick="control('white')">
                <i data-lucide="maximize"></i>
                White
            </div>
            <div class="action-card" onclick="control('laser')">
                <i data-lucide="mouse-pointer-2"></i>
                Laser
            </div>
            <div class="action-card danger" onclick="control('stop')">
                <i data-lucide="power"></i>
                Exit
            </div>
        </div>
    </div>

    <script>
        const apiPath = window.location.pathname.replace(/\/ui$/, '');
        async function control(action) {
            try {
                await fetch(`${apiPath}/control/${action}`, { method: 'POST' });
                if (window.navigator.vibrate) window.navigator.vibrate(15);
            } catch (e) { console.error('Action failed:', e); }
        }
        lucide.createIcons();
    </script>
</body>

</html>
