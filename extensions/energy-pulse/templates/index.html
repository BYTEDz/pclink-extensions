<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <script src="/ui/static/extension-theme.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* Main Status Card - Synced Radius */
      .pulse-card {
        background: var(--surface);
        border: var(--card-border);
        border-radius: var(--radius);
        padding: 32px;
        text-align: center;
        box-shadow: var(--card-shadow);
        position: relative;
        overflow: hidden;
      }

      /* Subtle accent top bar */
      .pulse-card::after {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 4px;
        background: var(--primary);
        opacity: 0.5;
      }

      .battery-level {
        font-size: 3.5rem;
        font-weight: 900;
        margin: 4px 0;
        color: var(--text);
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
      }

      .status-sub {
        font-weight: 800;
        font-size: 0.75rem;
        letter-spacing: 2px;
        color: var(--text-muted);
        text-transform: uppercase;
      }

      .plan-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
      }

      /* Plan Buttons - Synced Radius */
      .plan-btn {
        background: var(--surface);
        border: 2px solid transparent;
        color: var(--text);
        padding: 16px;
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        gap: 16px;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        text-align: left;
        box-shadow: var(--card-shadow);
      }

      .plan-btn i {
        flex-shrink: 0;
        padding: 12px;
        border-radius: calc(var(--radius) * 0.5); /* Inner radius slightly smaller */
        background: var(--primary-faint);
        color: var(--text);
        transition: all 0.2s ease;
      }

      .plan-info {
        display: flex;
        flex-direction: column;
        justify-content: center;
        line-height: 1.3;
      }

      .plan-info h3 {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
      }

      .plan-info p {
        margin: 0;
        font-size: 0.8rem;
        color: var(--text-muted);
        font-weight: 500;
      }

      /* Active State - SDK Colors */
      .plan-btn.active {
        border-color: var(--primary);
        background: var(--primary-faint);
        transform: scale(1.02);
      }

      .plan-btn.active i {
        background: var(--primary);
        color: white !important;
        box-shadow: 0 0 15px var(--primary-muted);
      }

      /* Toast Notification - Synced Style */
      #toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--primary);
        color: white;
        padding: 14px 28px;
        border-radius: var(--radius);
        font-weight: 800;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0;
        transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        z-index: 1000;
        white-space: nowrap;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      }

      #toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      /* Compatibility Warning Box */
      #compatWarning {
        display: none;
        background: var(--error-faint);
        border: 1px solid var(--error);
        color: var(--error);
        padding: 14px;
        border-radius: calc(var(--radius) * 0.5);
        font-size: 0.85rem;
        font-weight: 700;
        text-align: center;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="pulse-card">
        <div id="statusLabel" class="status-sub">Detecting System...</div>
        <div class="battery-level" id="levelText">--</div>
        <div id="detailLabel" style="font-size: 0.9rem; color: var(--text-muted); font-weight: 600; margin-top: 4px">
          AC Power
        </div>
      </div>

      <div class="plan-grid">
        <button class="plan-btn" id="btn-saver" onclick="setPlan('saver')">
          <i data-lucide="leaf"></i>
          <div class="plan-info">
            <h3>Power Saver</h3>
            <p>Minimum energy consumption</p>
          </div>
        </button>
        <button class="plan-btn" id="btn-balanced" onclick="setPlan('balanced')">
          <i data-lucide="scale"></i>
          <div class="plan-info">
            <h3>Balanced</h3>
            <p>Standard performance mode</p>
          </div>
        </button>
        <button class="plan-btn" id="btn-high" onclick="setPlan('high')">
          <i data-lucide="zap"></i>
          <div class="plan-info">
            <h3>High Performance</h3>
            <p>Maximum power and speed</p>
          </div>
        </button>
      </div>

      <div id="compatWarning">
        <i data-lucide="alert-circle" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"></i>
        Limited support on this device
      </div>
    </div>

    <div id="toast">Profile Updated</div>

    <script>
      const apiPath = window.location.pathname.replace(/\/ui$/, "");

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2000);
      }

      async function updateStatus() {
        try {
          const res = await fetch(`${apiPath}/status`);
          const data = await res.json();

          const lvl = document.getElementById("levelText");
          const lbl = document.getElementById("statusLabel");
          const det = document.getElementById("detailLabel");
          const warn = document.getElementById("compatWarning");

          if (data.has_battery) {
            lvl.innerText = data.percent + "%";
            lbl.innerText = data.power_plugged ? "Charging" : "On Battery";
            det.innerText = data.power_plugged ? "Power Connected" : "Discharging";
          } else {
            lvl.innerHTML = '<i data-lucide="plug-zap" style="width:48px; height:48px;"></i>';
            lbl.innerText = "Desktop PC";
            det.innerText = "AC Power Active";
            lucide.createIcons();
          }

          if (data.compatible === false) {
            warn.style.display = "block";
            document.querySelector(".plan-grid").style.opacity = "0.4";
            document.querySelector(".plan-grid").style.pointerEvents = "none";
          } else {
            warn.style.display = "none";
            document.querySelector(".plan-grid").style.opacity = "1";
            document.querySelector(".plan-grid").style.pointerEvents = "auto";
          }

          document.querySelectorAll(".plan-btn").forEach((b) => b.classList.remove("active"));
          const activeBtn = document.getElementById(`btn-${data.active_plan}`);
          if (activeBtn) activeBtn.classList.add("active");
        } catch (e) {
          console.error(e);
        }
      }

      async function setPlan(type) {
        try {
          const res = await fetch(`${apiPath}/set-plan/${type}`, { method: "POST" });
          const data = await res.json();
          if (data.success) {
            showToast(`Mode: ${type.toUpperCase()}`);
            updateStatus();
          }
        } catch (e) { console.error(e); }
      }

      setInterval(updateStatus, 5000);
      updateStatus();
      lucide.createIcons();
    </script>
  </body>
</html>
