<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clipboard History</title>
    <script src="/ui/static/extension-theme.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #12100e;
            --surface: #1e1b18;
            --surface-hover: rgba(255, 255, 255, 0.05);
            --primary: #f39c12;
            --on-primary: #000;
            --accent: #03dac6;
            --danger: #e74c3c;
            --text: #e0e0e0;
            --text-secondary: #a0a0a0;
            --divider: rgba(255, 255, 255, 0.05);
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --card-border: 1px solid rgba(255, 255, 255, 0.05);
            --radius: 16px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; width: 100%; overflow-x: hidden; background: var(--bg);
        }

        body { font-family: 'Inter', sans-serif; color: var(--text); padding: 16px; }

        .icon-btn {
            background: transparent; border: none; color: var(--text-secondary); cursor: pointer;
            padding: 8px; border-radius: 50%; transition: all 0.2s; display: flex;
            align-items: center; justify-content: center;
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.1); color: var(--danger); }

        .input-container {
            position: relative; background: var(--surface); border-radius: var(--radius);
            margin-bottom: 24px; border: var(--card-border); transition: border-color 0.2s;
            display: flex; align-items: center; overflow: hidden;
        }
        .input-container:focus-within { border-color: var(--primary); }
        .input-container input { padding-left: 12px; }
        input[type="text"] {
            flex: 1; width: 100%; background: transparent; border: none; color: white;
            font-family: 'Inter', sans-serif; font-size: 16px; outline: none; padding: 14px 12px;
        }

        .send-btn {
            background: var(--primary); color: var(--on-primary); border: none; padding: 12px 20px;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .card {
            background: var(--surface); padding: 12px 16px; margin-bottom: 8px; border-radius: var(--radius);
            border: var(--card-border); cursor: pointer; display: flex; align-items: center; justify-content: space-between;
        }
        .card-content { flex: 1; overflow: hidden; margin-right: 12px; }
        .card-preview { font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta { font-size: 11px; color: var(--text-secondary); }

        .copy-btn {
            background: rgba(255,255,255,0.05); border: none; border-radius: 50%; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center; color: var(--text-secondary); cursor: pointer; flex-shrink: 0; transition: all 0.2s;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: var(--primary); }

        #main-view { display: flex; flex-direction: column; height: 100vh; }
        #list { flex: 1; overflow-y: auto; padding-bottom: 24px; }

        #detail-view {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg);
            z-index: 50; display: none; flex-direction: column;
        }
        #detail-top { display: flex; align-items: center; padding: 16px; border-bottom: var(--card-border); }
        #detail-top .title { font-weight: 600; font-size: 16px; flex: 1; text-align: center; margin-right: 36px; }
        #detail-content {
            flex: 1; padding: 20px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
            font-size: 14px; font-family: 'Consolas', 'Monaco', monospace; background: rgba(0,0,0,0.2);
        }
        .bottom-nav {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px;
            background: var(--surface); border-top: var(--card-border);
        }
        .bottom-nav button {
            padding: 14px; border-radius: 12px; border: var(--card-border); background: transparent;
            color: white; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
        }
        .bottom-nav button.primary { background: var(--primary); color: var(--on-primary); border: none; }

        .toast {
            position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--primary); color: var(--on-primary); padding: 12px 24px; border-radius: 30px;
            opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100; font-weight: 600;
        }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>

<body>

    <div id="main-view">
        <div class="input-container">
            <input type="text" id="sendInput" placeholder="Send text to PC...">
            <button class="send-btn" onclick="sendToPc()"><i data-lucide="send"></i></button>
        </div>

        <div class="input-container search-bar">
            <input type="text" id="searchInput" placeholder="Search history..." onkeyup="handleSearch()">
            <button class="icon-btn" onclick="clearHistory()"><i data-lucide="trash-2"></i></button>
        </div>

        <div id="list"></div>
    </div>

    <div id="detail-view">
        <div id="detail-content"></div>
        <div class="bottom-nav">
            <button onclick="copyDetail()"><i data-lucide="copy"></i> Copy</button>
            <button class="primary" onclick="sendDetail()"><i data-lucide="monitor-up"></i> Send</button>
        </div>
    </div>

    <div id="toast" class="toast"><span id="toast-msg"></span></div>

    <script>
        const API_BASE = window.location.pathname.replace(/\/ui$/, '');
        let fullHistory = [];
        let currentItem = null;

        lucide.createIcons();

        // Handle Back Button / Gesture
        window.addEventListener('popstate', (event) => {
            const isDetail = window.location.search.includes('page=detail');
            document.getElementById('main-view').style.display = isDetail ? 'none' : 'flex';
            document.getElementById('detail-view').style.display = isDetail ? 'flex' : 'none';
        });

        async function fetchHistory() {
            try {
                const res = await fetch(`${API_BASE}/history`);
                fullHistory = await res.json();
                handleSearch();
            } catch (e) { console.error(e); }
        }

        function openDetail(id) {
            currentItem = fullHistory.find(i => String(i.id) === String(id));
            if (!currentItem) return;

            document.getElementById('detail-content').textContent = currentItem.content;
            
            // Navigate forwards into detail view
            history.pushState({ page: 'detail' }, "Detail", "?page=detail");
            // Manually trigger visual state change to align with history
            window.dispatchEvent(new Event('popstate'));
        }

        function goBack() {
            history.back();
        }

        // ... (Existing functions: handleSearch, render, sendToPc, copyFromModal, showToast)
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            render(fullHistory.filter(i => i.content.toLowerCase().includes(query)));
        }

        function render(data) {
            const list = document.getElementById('list');
            list.innerHTML = data.map(item => `
                <div class="card" onclick="openDetail('${item.id}')">
                    <div class="card-content">
                        <div class="card-preview">${escapeHtml(item.content)}</div>
                        <span class="meta">${new Date(item.timestamp * 1000).toLocaleTimeString()}</span>
                    </div>
                    <button class="copy-btn" onclick="quickCopy(event, '${item.id}')" title="Copy">
                        <i data-lucide="copy" style="width: 16px; height: 16px;"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function sendToPc(textOverride) {
            const text = textOverride || document.getElementById('sendInput').value;
            if (!text) return;
            await fetch(`${API_BASE}/copy`, { method: 'POST', body: JSON.stringify({ content: text }), headers: {'Content-Type': 'application/json'} });
            showToast("Sent to PC");
            if (!textOverride) document.getElementById('sendInput').value = '';
            fetchHistory();
        }

        function quickCopy(e, id) {
            e.stopPropagation(); // prevent opening the detail view
            const entry = fullHistory.find(i => String(i.id) === String(id));
            if (entry) {
                navigator.clipboard.writeText(entry.content).then(() => showToast("Copied!"));
            }
        }

        function copyDetail() {
            if (!currentItem) return;
            navigator.clipboard.writeText(currentItem.content).then(() => showToast("Copied!"));
        }

        function sendDetail() {
            if (!currentItem) return;
            sendToPc(currentItem.content);
            goBack();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 2500);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        setInterval(fetchHistory, 3000);
        fetchHistory();
    </script>
</body>
</html>
